name: release-audit

on:
  push:
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Run tests
        run: pytest -q
      - name: Self test
        run: qkernel self-test
      - name: Generate application packet artifact
        run: |
          qkernel application-packet examples/application_packet_demo.json \
            --out-json experiments/output/application_packet.json \
            --out-md experiments/output/application_packet.md
      - name: Verify blocked application packet fails claims gate
        run: |
          if qkernel application-packet examples/application_packet_demo.json --fail-on-blocked; then
            echo "expected demo application packet to fail blocked claim gate"
            exit 1
          fi
      - name: Release audit
        run: qkernel release-audit --root .
